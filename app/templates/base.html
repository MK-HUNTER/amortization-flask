<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Platform Ledger Engine{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e40af;
            --primary-dark: #1e3a8a;
            --accent: #3b82f6;
            --neutral-50: #f8fafc;
            --neutral-100: #f1f5f9;
            --neutral-200: #e2e8f0;
            --neutral-300: #cbd5e1;
            --neutral-700: #334155;
            --neutral-900: #0f172a;
            --radius: 12px;
            --shadow-sm: 0 1px 3px rgba(15,23,42,0.06), 0 1px 2px rgba(15,23,42,0.04);
            --shadow: 0 4px 12px rgba(15,23,42,0.08);
            --shadow-md: 0 10px 15px -3px rgba(15,23,42,0.1), 0 4px 6px -4px rgba(15,23,42,0.1);
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--neutral-50);
            color: var(--neutral-900);
        }
        .heading-token { font-family: 'Inter', sans-serif; letter-spacing: -0.025em; }
        aside {
            background-color: #ffffff;
            border-right: 1px solid var(--neutral-200);
            box-shadow: var(--shadow-sm);
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        aside.collapsed { width: 0px !important; border-right-width: 0px !important; overflow: hidden; }
        .block-link {
            border-radius: var(--radius);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 4px;
        }
        .block-link:hover {
            background-color: var(--neutral-100);
            transform: translateX(4px);
            box-shadow: var(--shadow-sm);
        }
        .bg-gray-50 { border: 1px solid var(--neutral-200); background-color: var(--neutral-100); border-radius: var(--radius); }
        .saas-table { border-collapse: separate; border-spacing: 0; }
        .saas-table th {
            background-color: #f8fafc; color: #64748b; font-weight: 600;
            text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; padding: 14px 12px !important;
        }
        .saas-table td { padding: 14px 12px !important; transition: background-color 0.15s; }
        .saas-table tr:hover td { background-color: #f0f9ff; }
        .sticky-header th { background-color: #f8fafc; top: 0; z-index: 20; box-shadow: 0 1px 0 rgba(0,0,0,0.05); }
        input, select, button { border-radius: 8px; transition: all 0.2s ease; }
        input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); outline: none; }
        .tabular-data-flag { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
    </style>
</head>
<body class="h-screen flex overflow-hidden relative">

    {% include "partials/_sidebar.html" %}
 
    <main class="flex-1 flex flex-col overflow-hidden bg-[#f8fafc]">
        
        <div id="floating-open-bar" class="hidden bg-white border-b border-[#e2e8f0] px-6 py-2.5 items-center flex-shrink-0 z-20">
            <button onclick="toggleSidebar(true)" class="flex items-center space-x-2 text-xs font-semibold text-[#1e40af] hover:text-[#1e3a8a]">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M11.25 4.5l7.5 7.5-7.5 7.5m-6-15l7.5 7.5-7.5 7.5" />
                </svg>
                <span>Open Navigation System</span>
            </button>
        </div>

        {% block content %}{% endblock %}

    </main>
 
    <div id="modal-container" class="hidden fixed inset-0 bg-black/50 backdrop-blur-xs flex items-center justify-center z-50">
        <div class="bg-white w-full max-w-lg rounded-md shadow-xl border border-[#e2e8f0] overflow-hidden flex flex-col">
            <header class="bg-[#f8fafc] px-6 py-4 border-b border-[#e2e8f0] flex justify-between items-center">
                <h3 class="text-base font-bold text-gray-900 heading-token">Provision New Calculation Structure</h3>
                <button onclick="toggleModal(false)" class="text-gray-400 hover:text-gray-600 font-bold text-xl">&times;</button>
            </header>
 
            <form action="{{ url_for('main.handle_create_loan') }}" method="POST" class="p-6 space-y-4 text-sm">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Loan ID Tracker *</label>
                        <input type="text" name="loan_id" placeholder="e.g. COMM-301" required class="w-full px-3 py-2 border border-[#e2e8f0] rounded font-mono"/>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Loan Name Alias *</label>
                        <input type="text" name="loan_name" placeholder="Alpha Property Acquisition" required class="w-full px-3 py-2 border border-[#e2e8f0] rounded"/>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Principal Asset Amount ($) *</label>
                        <input type="number" step="0.01" name="principal" placeholder="500000.00" required class="w-full px-3 py-2 border border-[#e2e8f0] rounded tabular-data-flag"/>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Annual Interest Rate (%) *</label>
                        <input type="number" step="0.01" name="rate" placeholder="6.50" required class="w-full px-3 py-2 border border-[#e2e8f0] rounded tabular-data-flag"/>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Amortization Term (Years) *</label>
                        <input type="number" name="term_years" placeholder="30" required class="w-full px-3 py-2 border border-[#e2e8f0] rounded"/>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Balloon Horizon Term (Years)</label>
                        <input type="number" name="balloon_years" value="0" placeholder="0 to Disable" class="w-full px-3 py-2 border border-[#e2e8f0] rounded"/>
                        <p class="text-[11px] text-gray-400 mt-0.5">Input 0 for fully-amortized tracks</p>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Lifecycle Start Date *</label>
                    <input type="date" name="start_date" required class="w-full px-3 py-2 border border-[#e2e8f0] rounded"/>
                </div>
                <footer class="pt-4 border-t border-gray-100 flex justify-end space-x-3">
                    <button type="button" onclick="toggleModal(false)" class="px-4 py-2 bg-gray-100 text-gray-700 font-medium rounded hover:bg-gray-200">Cancel</button>
                    <button type="submit" class="px-5 py-2 bg-[#1e40af] text-white font-semibold rounded flex items-center space-x-2 hover:bg-[#1e3a8a]">
                        <span>📥</span> <span>Save Loan</span>
                    </button>
                </footer>
            </form>
        </div>
    </div>
 
    <script>
        function toggleModal(show) {
            const el = document.getElementById('modal-container');
            if (show) el.classList.remove('hidden');
            else el.classList.add('hidden');
        }

        function toggleSidebar(show) {
            const sidebar = document.getElementById('sidebar-panel');
            const openBar = document.getElementById('floating-open-bar');
            if (show) {
                sidebar.classList.remove('collapsed');
                openBar.classList.replace('flex', 'hidden');
            } else {
                sidebar.classList.add('collapsed');
                openBar.classList.replace('hidden', 'flex');
            }
        }
    </script>
</body>
</html>
