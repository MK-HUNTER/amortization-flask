<aside id="sidebar-panel"
class="
w-[220px]
h-screen
bg-[#f7f7f7]
border-r border-[#dcdcdc]
flex flex-col
shrink-0
">

    <!-- LOGO -->
    <div class="h-[58px] px-5 border-b border-[#e5e5e5] flex items-center">

        <div class="flex items-center gap-3">

            <!-- LOGO BOX -->
            <div class="
                w-8 h-8
                bg-[#2b2f36]
                rounded-[4px]
                flex items-center justify-center
                text-white
                text-[13px]
                font-bold
            ">
                A
            </div>

            <!-- TITLE -->
            <div class="leading-tight">

                <div class="text-[14px] font-semibold text-[#1f2937]">
                    Amortize Pro
                </div>

            </div>

        </div>

    </div>

    <!-- NAVIGATION -->
    <nav class="flex-1 pt-3">

        <!-- DASHBOARD -->
        <a href="{{ url_for('main.portfolio_overview') }}"
        class="
            flex items-center gap-3
            h-[42px]
            px-5
            text-[13px]
            border-l-[3px]
            transition-all duration-150

            {% if request.endpoint == 'main.portfolio_overview' %}
                bg-[#ececec]
                border-[#d97706]
                text-[#111827]
                font-semibold
            {% else %}
                border-transparent
                text-[#374151]
                hover:bg-[#efefef]
            {% endif %}
        ">

            <svg xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.8"
                stroke="currentColor"
                class="w-4 h-4">

                <path stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M3.75 3h7.5v7.5h-7.5zm9 0h7.5v7.5h-7.5zm-9 9h7.5v7.5h-7.5zm9 0h7.5v7.5h-7.5z" />

            </svg>

        </a>

        <!-- LOAN SCHEDULE -->
        <a href="{{ url_for('main.loan_detail_view') }}"

            {% if request.endpoint == 'main.loan_detail_view' %}

                text-[#111827]

            {% else %}

                hover:bg-[#efefef]

            <svg xmlns="http://www.w3.org/2000/svg"

                stroke-width="1.8"
                stroke="currentColor"
                class="w-4 h-4">

                <path stroke-linecap="round"

        </a>
